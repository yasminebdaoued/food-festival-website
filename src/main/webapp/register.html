<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Food Festival - Registration</title>
    <link rel="stylesheet" href="css/stylesignup.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">Food Festival</a>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="events.jsp">Festivals</a>
            <a href="vendors.html">Vendors</a>
            <a href="contact.html">Contact</a>
            <a href="register.html" class="active">Register</a>
        </div>
    </nav>

    <section>
        <div class="signup-box">
            <form id="registerForm" action="confirmation.jsp" method="post" onsubmit="return validateRegisterForm()">
                <h2>Visitor Registration Form</h2>
                <div class="input-box">
                    <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                    <input id="fullName" name="fullName" type="text" placeholder=" ">
                    <label for="fullName">Full Name</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
                    <input id="email" name="email" type="email" placeholder=" ">
                    <label for="email">Email</label>
                </div>

				<div class="input-box">
                <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
                <input id="password" name="password" type="password" placeholder=" ">
                <label for="password">Password</label>
                </div>

                <div class="input-box select-box">
                <span class="icon"><ion-icon name="pizza-outline"></ion-icon></span>
                <select id="festival" name="festival">
                <option value="">Select Preferred Festival</option>
                <option value="Tastefully Food Expo">Tastefully Food Expo</option>
                <option value="Matcha & Cakes Festival">Matcha & Cakes Festival</option>
                <option value="Sabah International Food Expo">Sabah International Food Expo</option>
                <option value="Malaysia International Food & Beverage Fair">Malaysia International Food & Beverage Fair</option>
                </select>
                </div>

                <div class="input-box message-box">
               <span class="icon"><ion-icon name="chatbox-ellipses-outline"></ion-icon></span>
               <textarea id="message" name="message" placeholder=" "></textarea>
               <label for="message">Message / Special Requests</label>
               </div>

                <button type="submit">Submit</button>

                <div class="login-link">
                    <p>Already registered? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
    </section>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
