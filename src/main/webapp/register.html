<%@ page language="java" contentType="text/html; charset=UTF-8"
    pageEncoding="UTF-8"%>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Festival</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>
	<div class="signup-box">
	<h1> Sign Up </h1>
	<h4> It's free and only takes a minute</h4>
	<form action="confirmation.jsp" method="post">
	<label for ="firstName">First Name</label>
	<input id="firstName" name="firstName" type="text" placeholder="First Name">
	
	<label for ="lastName">Last Name</label>
	<input id="lastName" name="lastName" type="text" placeholder="Last Name">
	
	<label for ="email">Email</label>
	<input id="email" name="email" type="email" placeholder="abc@example.com">
	
	<label for ="password">Password</label>
	<input id="password" type="password">
	
	<label for ="cPassword">Confirm Password</label>
	<input id="cPassword" type="password">
	
	<input type="submit" value="Submit">
	</form>
	
	<p>
		By clicking the Sign Up button, you agree to our <br/>
		<a href="#"> Terms and Conditions</a> and <a href="#">Policy Privacy</a>
	</p>
	</div>
	
	<p class="login-para">Already have an account? <a href="login.html">Login here</a> </p>
<script src="js/validation.js"></script>
</body>
</html>
